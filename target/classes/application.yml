spring:
  application:
    name: finly-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/finly_db
    username: finly_user
    password: finly_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token-expiration: 900000 # 15 minutes (in milliseconds)
  refresh-token-expiration: 604800000 # 7 days (in milliseconds)

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.authentication: DEBUG

vaadin:
  exclude-urls: /swagger-ui/**,/v3/api-docs/**,/swagger-ui.html,/swagger/**,/swagger
  launch-browser: false
  allowed-packages: com.vaadin,org.vaadin,com.finly.backend

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger
